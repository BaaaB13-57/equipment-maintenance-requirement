<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - MineKeep</title>
    <link rel="stylesheet" href="../css/common.css?v=20260714-popup-ui">
    <style>
        body { min-height: 100vh; display: grid; place-items: center; padding: 1rem; background: #eef2f8; }
        .profile-card { width: min(540px, 100%); padding: 2rem; border-radius: 1.25rem; background: #fff; box-shadow: 0 18px 50px rgba(14,25,55,.14); }
        .profile-head { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
        .profile-avatar { display: grid; place-items: center; width: 64px; height: 64px; border-radius: 50%; color: #fff; background: #1f3a72; font-weight: 800; }
        .profile-head h1, .profile-head p { margin: 0; } .profile-head p, dt { color: #718096; }
        dl { display: grid; grid-template-columns: 120px 1fr; gap: .8rem; padding: 1.25rem; border-radius: 1rem; background: #f7f9fc; }
        dd { margin: 0; font-weight: 700; overflow-wrap: anywhere; }
        .profile-actions { display: flex; gap: .75rem; margin-top: 1.5rem; }
        @media (max-width: 480px) { .profile-card { padding: 1.25rem; } dl { grid-template-columns: 1fr; gap: .25rem; } dd { margin-bottom: .6rem; } }
    </style>
</head>
<body>
    <main class="profile-card">
        <div class="profile-head"><div class="profile-avatar" id="profileAvatar">US</div><div><h1 id="profilePageName">My Profile</h1><p>MineKeep account</p></div></div>
        <dl><dt>Email</dt><dd id="profilePageEmail">Loading...</dd><dt>Role</dt><dd id="profilePageRole">Loading...</dd><dt>Department</dt><dd id="profilePageDepartment">Loading...</dd><dt>Phone</dt><dd id="profilePagePhone">—</dd></dl>
        <div class="profile-actions"><a class="btn btn-primary" id="backToDashboard" href="#">Back to dashboard</a><button class="btn btn-danger" id="logoutBtn">Logout</button></div>
    </main>
    <script src="../js/common.js?v=20260714-sidebar-profile"></script>
    <script>
        fetch('/users/session').then(response => response.json()).then(({ user }) => {
            document.getElementById('profilePageName').textContent = user.name;
            document.getElementById('profileAvatar').textContent = getInitials(user.name);
            document.getElementById('profilePageEmail').textContent = user.email;
            document.getElementById('profilePageRole').textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
            document.getElementById('profilePageDepartment').textContent = user.department || '—';
            document.getElementById('profilePagePhone').textContent = user.phone || '—';
            document.getElementById('backToDashboard').href = user.dashboard;
        });
    </script>
</body>
</html>
